# DataSource for sqlite is created in com.hospital.config.SqliteDataSourceConfig (avoids env URL clashes).
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# وضع تطوير محلي: عند التشغيل نُعاد كتابة hash كلمة مرور admin إلى admin123 (لا تفعّل في إنتاج)
hospital.dev.reset-admin-credentials=true
