# Add to Render etc.: SPRING_PROFILES_ACTIVE=postgres,prod
# Or: SPRING_PROFILES_ACTIVE=prod (with sqlite — not recommended in cloud)

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.com.hospital=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=INFO
# HHH90000025 (explicit PostgreSQL dialect) spams every deploy; keep dialect for URL edge cases
logging.level.org.hibernate.orm.deprecation=ERROR

# Smaller footprint on Render free (512MB)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
