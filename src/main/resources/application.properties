server.port=${PORT:8080}
server.address=0.0.0.0
spring.application.name=Hospital Management System

# sqlite = works without Docker (default). postgres = needs PostgreSQL (e.g. docker compose up -d)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:sqlite}

spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET:MySuperSuperSecretKeyThatIsLongEnough1234}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

file.upload-dir=./uploads

# When user is approved, optional notification email (set spring.mail.host to enable)
app.mail.from=${MAIL_FROM:}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
# Comma-separated; set CORS_ALLOWED_ORIGINS in production. Use * in patterns only for dev if needed.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
# spring.mail.host=
# spring.mail.port=587
# spring.mail.username=
# spring.mail.password=
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.com.hospital=${LOG_LEVEL_COM_HOSPITAL:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_ORG_SECURITY:DEBUG}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}

# Actuator (health for Render, Fly, etc.)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
