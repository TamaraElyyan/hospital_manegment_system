# Render Blueprint — استمر من Dashboard: New → Blueprint → ربط الريبو
#
# ينشئ: PostgreSQL مجاني + ويب (Docker) للـ API
# بعد أول نشر: أضيفي رابط الواجهة في CORS_ALLOWED_ORIGINS ثم Redeploy

version: "1"
databases:
  - name: hospital-db
    plan: free
    region: oregon

services:
  - type: web
    name: hospital-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres,prod
      - key: PORT
        value: 8080
      - key: JPA_SHOW_SQL
        value: "false"
      - key: HIBERNATE_FORMAT_SQL
        value: "false"
      - key: LOG_LEVEL_COM_HOSPITAL
        value: INFO
      - key: LOG_LEVEL_ORG_SECURITY
        value: WARN
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
