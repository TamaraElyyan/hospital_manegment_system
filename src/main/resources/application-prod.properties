# Split deploy (e.g. frontend on Render + API on Railway). If CORS is blocked, set these on the
# API (Railway) without quotes; or omit CORS_ALLOWED_ORIGINS to use application.properties default.
# CORS_ALLOWED_ORIGINS=https://hospital-manegment-system-zu6i.onrender.com
# FRONTEND_BASE_URL=https://hospital-manegment-system-zu6i.onrender.com
#
# Add to Render etc.: SPRING_PROFILES_ACTIVE=postgres,prod
# Or: SPRING_PROFILES_ACTIVE=prod (with sqlite — not recommended in cloud)

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.com.hospital=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=INFO
# HHH90000025 (explicit PostgreSQL dialect) spams every deploy; keep dialect for URL edge cases
logging.level.org.hibernate.orm.deprecation=ERROR
# Same as application-postgres when profile is postgres,prod — avoids Hibernate hiding DB errors
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Smaller footprint on Render free (512MB)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.jmx.enabled=false
server.tomcat.threads.max=30
server.tomcat.threads.min-spare=2
