# --- PostgreSQL profile (SPRING_PROFILES_ACTIVE=postgres) ---
# Default login below matches docker-compose.yml in this project.
# If you get: password authentication failed for user "hospital"
#   A) Use SQLite (no Postgres): open a NEW terminal, run:  Remove-Item Env:SPRING_PROFILES_ACTIVE -ErrorAction SilentlyContinue
#      then: mvn spring-boot:run   (default profile is sqlite)
#   B) Or create this user in Postgres (run as superuser, e.g. psql -U postgres):
#        CREATE USER hospital WITH PASSWORD 'hospital';
#        CREATE DATABASE hospitaldb OWNER hospital;
#        GRANT ALL PRIVILEGES ON DATABASE hospitaldb TO hospital;
#   C) Or point the app to your own user/password via env (no file edit):
#        $env:SPRING_DATASOURCE_USERNAME = "postgres"
#        $env:SPRING_DATASOURCE_PASSWORD = "YOUR_PASSWORD"
#        $env:SPRING_DATASOURCE_URL = "jdbc:postgresql://localhost:5432/hospitaldb"

# JDBC URL: set SPRING_DATASOURCE_URL in env (docker-compose) or rely on HospitalManagementApplication
# mapping DATABASE_URL to system properties (Render). Do not set an empty default here.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:hospital}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hospital}
# Dialect: omitted — Hibernate 6 auto-detects PostgreSQL and logs if set explicitly

# Production / shared DB: do not auto-reset admin password on startup
hospital.dev.reset-admin-credentials=false
